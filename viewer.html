<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<title>Betrezen — Tripo3D Raw Demo</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #06060a;
    color: #e0e0e0;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100%;
    overflow-x: hidden;
  }
  body { padding: 12px; }

  .header {
    text-align: center;
    padding: 14px 8px 20px;
  }
  .header h1 {
    color: #f0c060;
    font-size: clamp(15px, 4vw, 20px);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .header p {
    color: #8a8480;
    font-size: clamp(10px, 2.5vw, 13px);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    max-width: 1100px;
    margin: 0 auto;
  }
  @media (min-width: 760px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }

  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    background: radial-gradient(ellipse at 50% 60%, #1f1c2a 0%, #08080d 100%);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  model-viewer {
    width: 100%; height: 100%;
    --poster-color: #08080d;
    background: transparent;
  }
  .label {
    position: absolute; bottom: 10px; left: 14px;
    color: #d0c898; font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    z-index: 10; pointer-events: none;
    opacity: 0.9;
  }
  .hint {
    text-align: center;
    color: #6a6560;
    font-size: 11px;
    margin: 16px 0 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>BETREZEN · Tripo3D Raw AI</h1>
  <p>4 модели без ручной правки · поверни / зум пальцем</p>
</div>

<div class="grid">
  <div class="cell">
    <model-viewer
      src="character%2B3d%2Bmodel.glb"
      alt="Head"
      auto-rotate auto-rotate-delay="0" rotation-per-second="30deg"
      camera-controls touch-action="pan-y"
      camera-orbit="0deg 75deg auto"
      shadow-intensity="0.85" shadow-softness="0.8"
      exposure="0.9"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none"
      loading="lazy" reveal="auto">
    </model-viewer>
    <div class="label">Head</div>
  </div>

  <div class="cell">
    <model-viewer
      src="angel%2B3d%2Bmodel.glb"
      alt="Bust + Wings"
      auto-rotate auto-rotate-delay="0" rotation-per-second="30deg"
      camera-controls touch-action="pan-y"
      camera-orbit="0deg 80deg auto"
      shadow-intensity="0.85" shadow-softness="0.8"
      exposure="0.9"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none"
      loading="lazy" reveal="auto">
    </model-viewer>
    <div class="label">Bust + Wings</div>
  </div>

  <div class="cell">
    <model-viewer
      src="mythical%2Bhumanoid%2B3d%2Bmodel.glb"
      alt="Full Body"
      auto-rotate auto-rotate-delay="0" rotation-per-second="30deg"
      camera-controls touch-action="pan-y"
      camera-orbit="0deg 85deg auto"
      shadow-intensity="0.85" shadow-softness="0.8"
      exposure="0.9"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none"
      loading="lazy" reveal="auto">
    </model-viewer>
    <div class="label">Full Body</div>
  </div>

  <div class="cell">
    <model-viewer
      src="hand%2B3d%2Bmodel.glb"
      alt="Hand"
      auto-rotate auto-rotate-delay="0" rotation-per-second="30deg"
      camera-controls touch-action="pan-y"
      camera-orbit="0deg 80deg auto"
      shadow-intensity="0.85" shadow-softness="0.8"
      exposure="0.9"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none"
      loading="lazy" reveal="auto">
    </model-viewer>
    <div class="label">Hands</div>
  </div>
</div>

<div class="hint">3D.GRYZ Studio · Wellore</div>

<script>
  function applyMatte(mv) {
    const model = mv.model;
    if (!model) return;
    model.materials.forEach(mat => {
      try {
        const pbr = mat.pbrMetallicRoughness;
        const mrTex = pbr.metallicRoughnessTexture;
        if (mrTex && mrTex.texture) {
          try { mrTex.setTexture(null); } catch(e1) {}
          try { mrTex.texture = null; } catch(e2) {}
        }
        pbr.setRoughnessFactor(0.85);
        pbr.setMetallicFactor(0.0);
      } catch(e) {}
    });
  }
  document.querySelectorAll('model-viewer').forEach(v => {
    v.addEventListener('load', () => applyMatte(v));
  });
</script>
</body>
</html>
