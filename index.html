<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betrezen — Tripo3D Raw Demo</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0d0d12; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }
  .stage {
    width: 100vmin; height: 100vmin;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    background: radial-gradient(ellipse at center, #1a1a25 0%, #06060a 100%);
    padding: 4px;
    position: relative;
  }
  .cell {
    position: relative;
    background: radial-gradient(ellipse at 50% 60%, #2a2533 0%, #0a0a12 100%);
    border-radius: 4px;
    overflow: hidden;
  }
  model-viewer {
    width: 100%; height: 100%;
    --poster-color: transparent;
    background: transparent;
  }
  .label {
    position: absolute; bottom: 8px; left: 12px;
    color: #d0c898; font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    z-index: 10; pointer-events: none;
    opacity: 0.85;
  }
  .title {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    color: #f0c060; font-size: 13px; letter-spacing: 3px;
    font-weight: 700; text-transform: uppercase;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    z-index: 20; pointer-events: none;
  }
  #loader {
    position: fixed; inset: 0;
    background: #06060a;
    display: flex; align-items: center; justify-content: center;
    color: #d0c898; font-size: 18px; letter-spacing: 2px;
    z-index: 100;
  }
  #loader.hidden { display: none; }
</style>
</head>
<body>
<div id="loader">Loading models <span id="count">0/4</span>...</div>

<div class="stage">
  <div class="title">BETREZEN · Tripo3D Raw AI</div>

  <div class="cell">
    <model-viewer id="mv1"
      src="character%2B3d%2Bmodel.glb"
      alt="Head"
      camera-controls
      camera-orbit="0deg 75deg auto"
      shadow-intensity="0.9" shadow-softness="0.8"
      exposure="0.85"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none">
    </model-viewer>
    <div class="label">Head</div>
  </div>

  <div class="cell">
    <model-viewer id="mv2"
      src="angel%2B3d%2Bmodel.glb"
      alt="Bust"
      camera-controls
      camera-orbit="0deg 80deg auto"
      shadow-intensity="0.9" shadow-softness="0.8"
      exposure="0.85"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none">
    </model-viewer>
    <div class="label">Bust + Wings</div>
  </div>

  <div class="cell">
    <model-viewer id="mv3"
      src="mythical%2Bhumanoid%2B3d%2Bmodel.glb"
      alt="Full body"
      camera-controls
      camera-orbit="0deg 85deg auto"
      shadow-intensity="0.9" shadow-softness="0.8"
      exposure="0.85"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none">
    </model-viewer>
    <div class="label">Full Body</div>
  </div>

  <div class="cell">
    <model-viewer id="mv4"
      src="hand%2B3d%2Bmodel.glb"
      alt="Hand"
      camera-controls
      camera-orbit="0deg 80deg auto"
      shadow-intensity="0.9" shadow-softness="0.8"
      exposure="0.85"
      environment-image="neutral"
      tone-mapping="aces"
      interaction-prompt="none">
    </model-viewer>
    <div class="label">Hands</div>
  </div>
</div>

<script>
  function applyMatte(mv) {
    const model = mv.model;
    if (!model) return;
    model.materials.forEach(mat => {
      try {
        const pbr = mat.pbrMetallicRoughness;
        // Снимаем PBR-текстуру с roughness/metalness, иначе фактор её только умножает
        const mrTex = pbr.metallicRoughnessTexture;
        if (mrTex && mrTex.texture) {
          try { mrTex.setTexture(null); } catch(e1) {}
          try { mrTex.texture = null; } catch(e2) {}
        }
        pbr.setRoughnessFactor(0.85);
        pbr.setMetallicFactor(0.0);
      } catch(e) { console.warn('mat err', e); }
    });
  }

  const viewers = document.querySelectorAll('model-viewer');
  const initialTheta = [0, 0, 0, 0]; // start angles per viewer
  let loaded = 0;
  const countEl = document.getElementById('count');
  const loader = document.getElementById('loader');

  viewers.forEach((v, i) => {
    v.addEventListener('load', () => {
      applyMatte(v);
      loaded++;
      countEl.textContent = `${loaded}/4`;
      if (loaded === 4) {
        // All loaded - start synchronized rotation
        loader.classList.add('hidden');
        // Wait a frame so canvases are stable, then mark ready
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            document.body.dataset.ready = '1';
            console.log('ALL_MODELS_READY');
            startSyncRotation();
          });
        });
      }
    });
  });

  function startSyncRotation() {
    const ROT_SPEED = 36; // degrees per second (one full rotation in 10s)
    const startTime = performance.now();
    function tick(now) {
      const elapsed = (now - startTime) / 1000;
      const theta = (elapsed * ROT_SPEED) % 360;
      viewers.forEach((v, i) => {
        // keep phi from current, set theta to synced value
        const orbit = v.getCameraOrbit();
        v.cameraOrbit = `${theta}deg ${orbit.phi * 180 / Math.PI}deg auto`;
      });
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
